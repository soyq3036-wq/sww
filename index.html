<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 예약 시스템</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  font-family:Pretendard;
  background:#f6f7fb;
  color:#111827;
  padding:20px;
}

h2{text-align:center;}

.section{
  max-width:800px;
  margin:20px auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
  border:1px solid #eef2f7;
}

h3{text-align:center;}

.item{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}

.label{
  width:120px;
  text-align:right;
  color:#6b7280;
  font-size:13px;
}

input,select{
  padding:6px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#f9fafb;
  text-align:center;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.save{background:#3b82f6;color:white;}
.del{background:#e5e7eb;}
.del:hover{background:#ef4444;color:white;}

.wait-row{padding:8px;border-radius:10px;}
.wait-soon{background:#fff7ed;}
.wait-urgent{background:#fee2e2;}

.time-label{font-size:11px;color:#6b7280;}
</style>
</head>

<body>

<h2>패도혈 예약 시스템</h2>

<div id="app"></div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= USER ================= */
let myName = localStorage.getItem("nickname") || prompt("닉네임") || "익명";
localStorage.setItem("nickname", myName);

/* ================= STRUCTURE ================= */
const layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

/* ================= REALTIME ================= */
db.ref("tracker").on("value", snap => {
  const v = snap.val() || { state:{}, waitList:[] };
  state = v.state || {};
  waitList = v.waitList || [];
  render();
});

function saveAll(){
  db.ref("tracker").set({ state, waitList });
}

/* ================= TARGET LIST ================= */
function getAllTargets(){
  return Object.entries(layout).flatMap(([s,list]) =>
    list.map(p => `${s} - ${p}`)
  );
}

/* ================= RENDER ================= */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  /* ================= 자리 ================= */
  Object.entries(layout).forEach(([sec,list]) => {
    const box = document.createElement("div");
    box.className = "section";

    const h = document.createElement("h3");
    h.innerText = sec;
    box.appendChild(h);

    list.forEach(pos => {
      const row = document.createElement("div");
      row.className = "item";

      const label = document.createElement("div");
      label.className = "label";
      label.innerText = pos;

      const name = document.createElement("input");
      name.value = state[pos]?.name || "";

      const save = document.createElement("button");
      save.className = "save";
      save.innerText = "저장";
      save.onclick = () => {
        state[pos] = {
          name: name.value,
          user: myName
        };
        saveAll();
      };

      const del = document.createElement("button");
      del.className = "del";
      del.innerText = "삭제";
      del.onclick = () => {
        delete state[pos];
        saveAll();
      };

      row.append(label, name, save, del);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  /* ================= 대기 ================= */
  const waitBox = document.createElement("div");
  waitBox.className = "section";

  const title = document.createElement("h3");
  title.innerText = "대기";
  waitBox.appendChild(title);

  const targets = getAllTargets();

  waitList.forEach((w,i) => {
    const row = document.createElement("div");
    row.className = "item wait-row";

    /* 이름 */
    const name = document.createElement("input");
    name.value = w.name || "";

    /* AM / PM */
    const period = document.createElement("select");
    ["AM","PM"].forEach(p => {
      const o = document.createElement("option");
      o.value = p;
      o.innerText = p;
      if (w.time?.period === p) o.selected = true;
      period.appendChild(o);
    });

    /* hour */
    const hour = document.createElement("select");
    for (let h=1; h<=12; h++){
      const o = document.createElement("option");
      o.value = String(h).padStart(2,"0");
      o.innerText = h;
      if (w.time?.hour === o.value) o.selected = true;
      hour.appendChild(o);
    }

    /* minute */
    const minute = document.createElement("select");
    for (let m=0; m<60; m+=5){
      const o = document.createElement("option");
      o.value = String(m).padStart(2,"0");
      o.innerText = o.value;
      if (w.time?.minute === o.value) o.selected = true;
      minute.appendChild(o);
    }

    /* ================= TARGET (자리무관 포함) ================= */
    const select = document.createElement("select");

    const any = document.createElement("option");
    any.value = "ANY";
    any.innerText = "🎯 자리무관";
    if (w.target === "ANY") any.selected = true;
    select.appendChild(any);

    targets.forEach(t => {
      const o = document.createElement("option");
      o.value = t;
      o.innerText = t;
      if (w.target === t) o.selected = true;
      select.appendChild(o);
    });

    /* 상태 */
    const status = document.createElement("div");
    status.className = "time-label";
    status.innerText =
      w.status === "ready"
        ? "🟢 대기중"
        : `🟡 대기 (${w.target || "미선택"})`;

    /* 저장 */
    const saveBtn = document.createElement("button");
    saveBtn.className = "save";
    saveBtn.innerText = "저장";
    saveBtn.onclick = () => {
      waitList[i] = {
        name: name.value,
        time: {
          period: period.value,
          hour: hour.value,
          minute: minute.value
        },
        target: select.value,
        status: w.status || "wait",
        user: myName
      };
      saveAll();
    };

    /* 즉시 */
    const fastBtn = document.createElement("button");
    fastBtn.className = "save";
    fastBtn.innerText = "즉시";
    fastBtn.onclick = () => {
      waitList[i] = {
        name: name.value,
        time: null,
        target: select.value,
        status: "ready",
        user: myName
      };
      saveAll();
    };

    /* 삭제 */
    const delBtn = document.createElement("button");
    delBtn.className = "del";
    delBtn.innerText = "삭제";
    delBtn.onclick = () => {
      waitList.splice(i,1);
      saveAll();
    };

    row.append(
      name,
      period,
      hour,
      minute,
      select,
      saveBtn,
      fastBtn,
      delBtn,
      status
    );

    waitBox.appendChild(row);
  });

  /* ================= ADD ================= */
  const add = document.createElement("button");
  add.className = "save";
  add.innerText = "대기 추가";
  add.onclick = () => {
    waitList.push({
      name: "새 인원",
      time: {
        period: "AM",
        hour: "12",
        minute: "00"
      },
      target: "ANY",
      status: "ready",
      user: myName
    });
    saveAll();
  };

  waitBox.appendChild(add);
  app.appendChild(waitBox);
}
</script>

</body>
</html>
