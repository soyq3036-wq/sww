<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 예약 시스템</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  font-family:Pretendard;
  background:#f6f7fb;
  padding:20px;
  color:#111827;
}

h2{text-align:center;}

.section{
  max-width:800px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:16px;
  border:1px solid #e5e7eb;
}

h3{text-align:center;}

.item{
  display:flex;
  gap:8px;
  justify-content:center;
  align-items:center;
  margin-bottom:10px;
}

.label{
  width:140px;
  text-align:right;
  color:#6b7280;
}

input{
  padding:6px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#f9fafb;
  text-align:center;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.save{background:#3b82f6;color:white;}
.del{background:#e5e7eb;}
.del:hover{background:#ef4444;color:white;}
</style>
</head>

<body>

<h2>패도혈 예약 시스템</h2>
<div id="app"></div>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey:"AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain:"array-ff467.firebaseapp.com",
  databaseURL:"https://array-ff467-default-rtdb.firebaseio.com/",
  projectId:"array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= 닉네임 ================= */
let myName = localStorage.getItem("nickname");

if(!myName){
  myName = prompt("닉네임 입력") || "익명";
  localStorage.setItem("nickname", myName);
}

/* ================= 자리 구조 ================= */
const layout = {
  "강남": [
    "1시 외각","1시 방","11시 외각","12시 방","9시 외각"
  ],
  "메인": [
    "11시 방","5시 방","3시 외각","3시 방"
  ],
  "서브": [
    "5시 외각","중앙법진","6시 외각","9시 방","6시 방"
  ]
};

let state = {};

/* ================= 🔥 초기값 세팅 ================= */
db.ref("tracker").once("value").then(snap=>{
  if(!snap.exists()){
    db.ref("tracker").set({
      state:{
        "1시 방": {name:"현대주방"}
      }
    });
  }
});

/* ================= 실시간 ================= */
db.ref("tracker").on("value", snap=>{
  const v = snap.val() || {state:{}};
  state = v.state || {};
  render();
});

/* ================= 저장 ================= */
function save(){
  db.ref("tracker").set({state});
}

/* ================= 렌더 ================= */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  Object.entries(layout).forEach(([sec,list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText = sec;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const label = document.createElement("div");
      label.className="label";
      label.innerText = pos;

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const saveBtn = document.createElement("button");
      saveBtn.className="save";
      saveBtn.innerText="저장";
      saveBtn.onclick=()=>{
        state[pos] = {
          name: input.value,
          user: myName
        };
        save();
      };

      const del = document.createElement("button");
      del.className="del";
      del.innerText="삭제";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      row.append(label,input,saveBtn,del);
      box.appendChild(row);
    });

    app.appendChild(box);
  });
}

</script>

</body>
</html>
