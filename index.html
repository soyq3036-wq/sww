<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 예약 시스템</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  font-family:Pretendard;
  background:#f6f7fb;
  padding:20px;
  color:#111827;
}

h2{text-align:center;}

.section{
  max-width:800px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:16px;
  border:1px solid #e5e7eb;
}

h3{text-align:center;}

.item{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  align-items:center;
  margin-bottom:10px;
}

.label{
  width:120px;
  text-align:right;
  color:#6b7280;
}

input,select{
  padding:6px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#f9fafb;
  text-align:center;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.save{background:#3b82f6;color:white;}
.del{background:#e5e7eb;}
.del:hover{background:#ef4444;color:white;}

.time-label{
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<h2>패도혈 예약 시스템</h2>

<div id="app"></div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= NICKNAME (완전 복구) ================= */
let myName = localStorage.getItem("nickname");

if(!myName){
  myName = prompt("닉네임 입력");
  if(!myName) myName = "익명";
  localStorage.setItem("nickname", myName);
}

/* ================= STRUCTURE ================= */
const layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

/* ================= REALTIME SAFE ================= */
db.ref("tracker").on("value", snap => {
  const data = snap.val();

  state = data?.state || {};
  waitList = data?.waitList || [];

  render();
});

/* ================= SAVE SAFE (꼬임 방지 핵심) ================= */
function saveAll(){
  db.ref("tracker").set({
    state: state,
    waitList: waitList
  });
}

/* ================= TARGET LIST ================= */
function getAllTargets(){
  return Object.entries(layout).flatMap(([sec,list]) =>
    list.map(p => `${sec} - ${p}`)
  );
}

/* ================= RENDER ================= */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  /* ===== 자리 ===== */
  Object.entries(layout).forEach(([sec,list]) => {
    const box = document.createElement("div");
    box.className = "section";

    const title = document.createElement("h3");
    title.innerText = sec;
    box.appendChild(title);

    list.forEach(pos => {
      const row = document.createElement("div");
      row.className = "item";

      const label = document.createElement("div");
      label.className = "label";
      label.innerText = pos;

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const btn = document.createElement("button");
      btn.className = "save";
      btn.innerText = "저장";
      btn.onclick = () => {
        state[pos] = {
          name: input.value,
          user: myName
        };
        saveAll();
      };

      const del = document.createElement("button");
      del.className = "del";
      del.innerText = "삭제";
      del.onclick = () => {
        delete state[pos];
        saveAll();
      };

      row.append(label, input, btn, del);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  /* ===== 대기 ===== */
  const waitBox = document.createElement("div");
  waitBox.className = "section";

  const h = document.createElement("h3");
  h.innerText = "대기";
  waitBox.appendChild(h);

  const targets = getAllTargets();

  waitList.forEach((w,i) => {

    const row = document.createElement("div");
    row.className = "item";

    /* name */
    const name = document.createElement("input");
    name.value = w.name || "";

    /* AM/PM */
    const period = document.createElement("select");
    ["AM","PM"].forEach(v=>{
      const o = document.createElement("option");
      o.value = v;
      o.innerText = v;
      if(w.time?.period === v) o.selected = true;
      period.appendChild(o);
    });

    /* hour */
    const hour = document.createElement("select");
    for(let h=1; h<=12; h++){
      const v = String(h).padStart(2,"0");
      const o = document.createElement("option");
      o.value = v;
      o.innerText = h;
      if(w.time?.hour === v) o.selected = true;
      hour.appendChild(o);
    }

    /* minute */
    const minute = document.createElement("select");
    for(let m=0; m<60; m+=5){
      const v = String(m).padStart(2,"0");
      const o = document.createElement("option");
      o.value = v;
      o.innerText = v;
      if(w.time?.minute === v) o.selected = true;
      minute.appendChild(o);
    }

    /* target */
    const select = document.createElement("select");

    const any = document.createElement("option");
    any.value = "ANY";
    any.innerText = "🎯 자리무관";
    if(w.target === "ANY") any.selected = true;
    select.appendChild(any);

    targets.forEach(t=>{
      const o = document.createElement("option");
      o.value = t;
      o.innerText = t;
      if(w.target === t) o.selected = true;
      select.appendChild(o);
    });

    /* status */
    const status = document.createElement("div");
    status.className = "time-label";
    status.innerText =
      w.status === "ready"
        ? "🟢 대기중"
        : `🟡 대기 (${w.target || "미선택"})`;

    /* save */
    const save = document.createElement("button");
    save.className = "save";
    save.innerText = "저장";
    save.onclick = () => {
      waitList[i] = {
        name: name.value,
        time: {
          period: period.value,
          hour: hour.value,
          minute: minute.value
        },
        target: select.value,
        status: w.status || "wait",
        user: myName
      };
      saveAll();
    };

    /* instant */
    const fast = document.createElement("button");
    fast.className = "save";
    fast.innerText = "즉시";
    fast.onclick = () => {
      waitList[i] = {
        name: name.value,
        time: null,
        target: select.value,
        status: "ready",
        user: myName
      };
      saveAll();
    };

    /* delete */
    const del = document.createElement("button");
    del.className = "del";
    del.innerText = "삭제";
    del.onclick = () => {
      waitList.splice(i,1);
      saveAll();
    };

    row.append(name, period, hour, minute, select, save, fast, del, status);
    waitBox.appendChild(row);
  });

  /* add */
  const add = document.createElement("button");
  add.className = "save";
  add.innerText = "대기 추가";
  add.onclick = () => {
    waitList.push({
      name: "새 인원",
      time: { period:"AM", hour:"12", minute:"00" },
      target: "ANY",
      status: "ready",
      user: myName
    });
    saveAll();
  };

  waitBox.appendChild(add);
  app.appendChild(waitBox);
}

</script>

</body>
</html>
