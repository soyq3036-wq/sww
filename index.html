<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  font-family:'Pretendard';
  background:#f6f7fb;
  color:#111827;
  padding:20px;
}

h2 {
  text-align:center;
}

.topbar {
  max-width:760px;
  margin:0 auto 20px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:16px;
  padding:12px;
  display:flex;
  justify-content:space-between;
}

.nickname {
  color:#6b7280;
  font-size:14px;
}

.section {
  max-width:760px;
  margin:20px auto;
  background:#fff;
  border-radius:18px;
  padding:20px;
  border:1px solid #eef2f7;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h3 {
  text-align:center;
}

.item {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  margin-bottom:10px;
  flex-wrap:wrap;
}

.label {
  width:120px;
  text-align:right;
  color:#6b7280;
}

input {
  width:120px;
  padding:8px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  text-align:center;
  background:#f9fafb;
}

input:focus {
  outline:none;
  border-color:#60a5fa;
  box-shadow:0 0 0 3px rgba(96,165,250,0.2);
  background:#fff;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.save { background:#3b82f6; color:white; }
.del { background:#e5e7eb; color:#374151; }
.del:hover { background:#ef4444; color:white; }

/* 상태 */
.wait-normal { background:#eef2ff; }
.wait-soon { background:#fff7ed; }
.wait-urgent { background:#fee2e2; }

.wait-row {
  padding:8px;
  border-radius:12px;
}

.time-label {
  font-size:11px;
  color:#6b7280;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>

<div class="topbar">
  <div id="nick"></div>
  <button onclick="changeName()">닉네임 변경</button>
</div>

<div id="app"></div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= USER ================= */
let myName = localStorage.getItem("nickname") || prompt("닉네임") || "익명";
localStorage.setItem("nickname", myName);

document.getElementById("nick").innerText = `👤 ${myName}`;

function changeName(){
  localStorage.removeItem("nickname");
  location.reload();
}

/* ================= DATA ================= */
let layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

/* ================= REALTIME ================= */
db.ref("tracker").on("value", snap=>{
  const val = snap.val() || {state:{}, waitList:[]};
  state = val.state || {};
  waitList = val.waitList || [];
  render();
});

function save(){
  db.ref("tracker").set({state, waitList});
}

/* ================= WAIT AUTO ================= */
function updateWaitStatus(){
  const now = new Date();
  let changed = false;

  waitList.forEach(w=>{
    if(!w.time) return;

    const [h,m] = w.time.split(":").map(Number);
    const t = new Date();
    t.setHours(h,m,0,0);

    if(now >= t){
      if(w.status !== "ready"){
        w.status = "ready";
        changed = true;
      }
    } else {
      if(!w.status) w.status = "wait";
    }
  });

  if(changed) save();
}

setInterval(updateWaitStatus,30000);

/* ================= WAIT STYLE ================= */
function getWaitClass(w){
  if(w.status === "ready") return "wait-urgent";
  if(w.status === "wait") return "wait-soon";
  return "wait-normal";
}

/* ================= EXPIRE CHECK ================= */
function isExpired(endTime){
  if(!endTime) return false;
  const now = new Date();
  const [h,m] = endTime.split(":").map(Number);
  const t = new Date();
  t.setHours(h,m,0,0);
  return now > t;
}

/* ================= RENDER ================= */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  /* ================= MAIN ================= */
  Object.entries(layout).forEach(([section,list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText = section;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const label = document.createElement("div");
      label.className="label";
      label.innerText = pos;

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const time = document.createElement("input");
      time.type="time";
      time.value = state[pos]?.endTime || "";

      const user = document.createElement("div");
      user.className="time-label";
      user.innerText = state[pos]?.user ? `(${state[pos].user})` : "";

      const timeLabel = document.createElement("div");
      timeLabel.className="time-label";

      if(state[pos]?.endTime){
        timeLabel.innerText = `⏰ ~ ${state[pos].endTime}`;
      } else {
        timeLabel.innerText = "⏰ 미설정";
      }

      if(state[pos]?.endTime && isExpired(state[pos].endTime)){
        row.style.background = "#fee2e2";
      }

      const saveBtn = document.createElement("button");
      saveBtn.className="save";
      saveBtn.innerText="저장";
      saveBtn.onclick=()=>{
        state[pos] = {
          name:input.value,
          endTime:time.value,
          user:myName
        };
        save();
      };

      const delBtn = document.createElement("button");
      delBtn.className="del";
      delBtn.innerText="삭제";
      delBtn.onclick=()=>{
        delete state[pos];
        save();
      };

      row.append(label,input,time,saveBtn,delBtn,user,timeLabel);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  /* ================= WAIT ================= */
  const waitBox = document.createElement("div");
  waitBox.className="section";

  const title = document.createElement("h3");
  title.innerText="대기";
  waitBox.appendChild(title);

  waitList.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className="item wait-row "+getWaitClass(w);

    const name = document.createElement("input");
    name.value = w.name||"";

    const time = document.createElement("input");
    time.type="time";
    time.value = w.time||"";

    const status = document.createElement("div");
    status.className="time-label";
    status.innerText = w.status==="ready" ? "🟢 대기중" : "🟡 대기";

    const saveBtn = document.createElement("button");
    saveBtn.className="save";
    saveBtn.innerText="저장";
    saveBtn.onclick=()=>{
      waitList[i]={
        name:name.value,
        time:time.value,
        status:w.status||"wait",
        user:myName
      };
      save();
    };

    const readyBtn = document.createElement("button");
    readyBtn.className="save";
    readyBtn.innerText="즉시 대기중";
    readyBtn.onclick=()=>{
      waitList[i]={
        name:name.value,
        time:"",
        status:"ready",
        user:myName
      };
      save();
    };

    const delBtn = document.createElement("button");
    delBtn.className="del";
    delBtn.innerText="삭제";
    delBtn.onclick=()=>{
      waitList.splice(i,1);
      save();
    };

    row.append(name,time,saveBtn,readyBtn,delBtn,status);
    waitBox.appendChild(row);
  });

  const addBtn = document.createElement("button");
  addBtn.className="save";
  addBtn.innerText="대기 추가";
  addBtn.onclick=()=>{
    waitList.push({
      name:"새 인원",
      time:"",
      status:"ready",
      user:myName
    });
    save();
  };

  waitBox.appendChild(addBtn);
  app.appendChild(waitBox);
}
</script>

</body>
</html>
