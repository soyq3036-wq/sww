<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 예약 시스템</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  font-family:Pretendard;
  background:#f6f7fb;
  padding:20px;
}

.section{
  max-width:800px;
  margin:20px auto;
  background:#fff;
  padding:20px;
  border-radius:16px;
}

.item{
  display:flex;
  gap:8px;
  justify-content:center;
  align-items:center;
  margin-bottom:10px;
}

.label{width:140px;text-align:right;color:#666;}

input,select{
  padding:6px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.save{background:#3b82f6;color:white;}
.del{background:#ddd;}
</style>
</head>

<body>

<h2 style="text-align:center;">패도혈 예약 시스템</h2>
<div id="app"></div>

<script>

/* Firebase */
const firebaseConfig = {
  apiKey:"AIzaSy...",
  authDomain:"array-ff467.firebaseapp.com",
  databaseURL:"https://array-ff467-default-rtdb.firebaseio.com/",
  projectId:"array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 닉네임 */
let myName = localStorage.getItem("nickname");
if(!myName){
  myName = prompt("닉네임 입력") || "익명";
  localStorage.setItem("nickname", myName);
}

/* 자리 구조 */
const layout = {
  "강남":["1시 외각","1시 방","11시 외각","12시 방","9시 외각"],
  "메인":["11시 방","5시 방","3시 외각","3시 방"],
  "서브":["5시 외각","중앙법진","6시 외각","9시 방","6시 방"]
};

let state = {};
let waitList = [];

/* 초기값 */
db.ref("tracker").once("value").then(snap=>{
  if(!snap.exists()){
    db.ref("tracker").set({
      state:{ "1시 방": {name:"현대주방"} },
      waitList:[]
    });
  }
});

/* 실시간 */
db.ref("tracker").on("value", snap=>{
  const v = snap.val() || {};
  state = v.state || {};
  waitList = v.waitList || [];
  render();
});

function save(){
  db.ref("tracker").set({state,waitList});
}

/* 전체 자리 목록 */
function getTargets(){
  return Object.entries(layout).flatMap(([s,list]) =>
    list.map(p=>`${s}-${p}`)
  );
}

/* 렌더 */
function render(){
  const app = document.getElementById("app");
  app.innerHTML="";

  /* ===== 자리 ===== */
  Object.entries(layout).forEach(([sec,list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText=sec;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const label = document.createElement("div");
      label.className="label";
      label.innerText=pos;

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      const saveBtn = document.createElement("button");
      saveBtn.className="save";
      saveBtn.innerText="저장";
      saveBtn.onclick=()=>{
        state[pos]={name:input.value,user:myName};
        save();
      };

      const del = document.createElement("button");
      del.className="del";
      del.innerText="삭제";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      row.append(label,input,saveBtn,del);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  /* ===== 대기 ===== */
  const waitBox = document.createElement("div");
  waitBox.className="section";

  const title = document.createElement("h3");
  title.innerText="대기";
  waitBox.appendChild(title);

  const targets = getTargets();

  waitList.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className="item";

    const name = document.createElement("input");
    name.value = w.name || "";

    const select = document.createElement("select");

    const any = document.createElement("option");
    any.value="ANY";
    any.innerText="자리무관";
    select.appendChild(any);

    targets.forEach(t=>{
      const o=document.createElement("option");
      o.value=t;
      o.innerText=t;
      if(w.target===t) o.selected=true;
      select.appendChild(o);
    });

    const saveBtn = document.createElement("button");
    saveBtn.className="save";
    saveBtn.innerText="저장";
    saveBtn.onclick=()=>{
      waitList[i]={name:name.value,target:select.value};
      save();
    };

    const del = document.createElement("button");
    del.className="del";
    del.innerText="삭제";
    del.onclick=()=>{
      waitList.splice(i,1);
      save();
    };

    row.append(name,select,saveBtn,del);
    waitBox.appendChild(row);
  });

  const add = document.createElement("button");
  add.className="save";
  add.innerText="대기 추가";
  add.onclick=()=>{
    waitList.push({name:"",target:"ANY"});
    save();
  };

  waitBox.appendChild(add);
  app.appendChild(waitBox);
}

</script>

</body>
</html>
