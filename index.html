<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body {
  font-family:'Pretendard';
  background:#0f172a;
  color:white;
  padding:20px;
}

h2 { text-align:center; margin-bottom:10px; }

.topbar { text-align:center; margin-bottom:20px; }

.nickname { font-size:14px; color:#94a3b8; }

.section {
  max-width:720px;
  margin:20px auto;
  background:#1e293b;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h3 { text-align:center; margin-bottom:15px; }

.item {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

.label {
  width:120px;
  text-align:right;
  color:#cbd5f5;
}

input {
  width:130px;
  padding:6px;
  border-radius:8px;
  border:none;
  text-align:center;
}

button {
  padding:5px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.save { background:#22c55e; color:white; }
.del { background:#475569; color:white; }

.wait-normal { background:#1e40af; }
.wait-soon { background:#f59e0b; }
.wait-urgent { background:#ef4444; }

.wait-row {
  padding:6px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>패도혈 실시간자리</h2>

<div class="topbar">
  <div id="nick" class="nickname"></div>
  <button onclick="changeName()">닉네임 변경</button>
</div>

<div id="app"></div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain: "array-ff467.firebaseapp.com",
  databaseURL: "https://array-ff467-default-rtdb.firebaseio.com/",
  projectId: "array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= USER ================= */
function getName(){
  let name = localStorage.getItem("nickname");

  if(!name || name.trim()===""){
    name = prompt("닉네임 입력");
    if(!name || name.trim()==="") return getName();
    localStorage.setItem("nickname", name.trim());
  }
  return name;
}

let myName = getName();
document.getElementById("nick").innerText = `👤 ${myName}`;

function changeName(){
  localStorage.removeItem("nickname");
  location.reload();
}

/* ================= DATA ================= */
let layout = {
  "강남자리": ["11시 방","11시 외각","1시 방","1시 외각"],
  "메인": ["5시 방","6시 방","6시 외각"],
  "서브": ["9시 방","9시 외각","3시 방","중앙법진"]
};

let state = {};
let waitList = [];

/* ================= REALTIME ================= */
db.ref("tracker").on("value", snap=>{
  let val = snap.val();
  if(!val){
    val = {state:{}, waitList:[]};
    db.ref("tracker").set(val);
  }
  state = val.state || {};
  waitList = val.waitList || [];
  render();
});

function save(){
  db.ref("tracker").update({state, waitList});
}

/* ================= WAIT AUTO ================= */
function updateWaitStatus(){
  let changed = false;
  const now = new Date();

  waitList.forEach((w)=>{
    if(!w.time) return;

    const [h,m] = w.time.split(":").map(Number);
    const t = new Date();
    t.setHours(h,m,0,0);

    if(now >= t){
      if(w.status !== "ready"){
        w.status = "ready";
        changed = true;
      }
    } else {
      if(!w.status) w.status = "wait";
    }
  });

  if(changed) save();
}

setInterval(updateWaitStatus, 30000);

/* ================= WAIT STYLE ================= */
function getWaitClass(w){
  if(w.status === "ready") return "wait-urgent";
  if(w.status === "wait") return "wait-soon";
  return "wait-normal";
}

/* ================= RENDER ================= */
function render(){
  const app = document.getElementById("app");
  app.innerHTML = "";

  /* ================= MAIN ================= */
  Object.entries(layout).forEach(([section, list])=>{
    const box = document.createElement("div");
    box.className="section";

    const title = document.createElement("h3");
    title.innerText = section;
    box.appendChild(title);

    list.forEach(pos=>{
      const row = document.createElement("div");
      row.className="item";

      const label = document.createElement("div");
      label.className="label";
      label.innerText = pos;

      const input = document.createElement("input");
      input.value = state[pos]?.name || "";

      input.onkeydown = (e)=>{
        if(e.key==="Enter"){
          if(!input.value.trim()) return;
          state[pos] = {name:input.value, user:myName};
          save();
        }
      };

      const saveBtn = document.createElement("button");
      saveBtn.className="save";
      saveBtn.innerText="저장";
      saveBtn.onclick=()=>{
        state[pos] = {name:input.value, user:myName};
        save();
      };

      const del = document.createElement("button");
      del.className="del";
      del.innerText="삭제";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      const user = document.createElement("div");
      user.style.fontSize="11px";
      user.style.color="#94a3b8";
      user.innerText = state[pos]?.user ? `(${state[pos].user})` : "";

      row.append(label,input,saveBtn,del,user);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  /* ================= WAIT ================= */
  const waitBox = document.createElement("div");
  waitBox.className="section";

  const title = document.createElement("h3");
  title.innerText="대기";
  waitBox.appendChild(title);

  waitList.forEach((w,i)=>{
    const row = document.createElement("div");
    row.className="item wait-row " + getWaitClass(w);

    const name = document.createElement("input");
    name.value = w.name || "";

    const time = document.createElement("input");
    time.type = "time";
    time.value = w.time || "";

    const status = document.createElement("div");
    status.style.fontSize="11px";
    status.style.color="#cbd5e1";
    status.innerText = w.status==="ready" ? "🟢 대기중" : "🟡 대기";

    const saveBtn = document.createElement("button");
    saveBtn.className="save";
    saveBtn.innerText="저장";
    saveBtn.onclick=()=>{
      waitList[i] = {
        name:name.value,
        time:time.value,
        status:w.status || "wait",
        user:myName
      };
      save();
    };

    const readyBtn = document.createElement("button");
    readyBtn.className="save";
    readyBtn.innerText="🟢 즉시 대기중";
    readyBtn.onclick=()=>{
      waitList[i] = {
        name:name.value,
        time:"",
        status:"ready",
        user:myName
      };
      save();
    };

    const del = document.createElement("button");
    del.className="del";
    del.innerText="삭제";
    del.onclick=()=>{
      waitList.splice(i,1);
      save();
    };

    row.append(name,time,saveBtn,readyBtn,del,status);
    waitBox.appendChild(row);
  });

  /* ================= ADD ================= */
  const addBtn = document.createElement("button");
  addBtn.className="save";
  addBtn.innerText="대기 추가";
  addBtn.onclick=()=>{
    waitList.push({
      name:"새 인원",
      time:"",
      status:"ready",
      user:myName
    });
    save();
  };

  waitBox.appendChild(addBtn);
  app.appendChild(waitBox);
}
</script>

</body>
</html>
