<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패도혈 실시간자리</title>

<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
body{
  font-family:Pretendard;
  background:#f6f7fb;
  color:#111827;
  padding:20px;
}

h2{text-align:center;}

.topbar{
  max-width:800px;
  margin:0 auto 20px;
  background:#fff;
  border:1px solid #e5e7eb;
  border-radius:14px;
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
}

.section{
  max-width:800px;
  margin:20px auto;
  background:#fff;
  border-radius:16px;
  padding:20px;
  border:1px solid #eef2f7;
}

h3{text-align:center;}

.item{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-bottom:10px;
}

.label{
  width:120px;
  text-align:right;
  color:#6b7280;
  font-size:13px;
}

input, select{
  padding:6px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  background:#f9fafb;
  text-align:center;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.save{background:#3b82f6;color:white;}
.del{background:#e5e7eb;}
.del:hover{background:#ef4444;color:white;}

.wait-row{padding:8px;border-radius:10px;}
.wait-normal{background:#eef2ff;}
.wait-soon{background:#fff7ed;}
.wait-urgent{background:#fee2e2;}

.time-label{font-size:11px;color:#6b7280;}
</style>
</head>

<body>

<h2>패도혈 예약 시스템</h2>

<div class="topbar">
  <div id="nick"></div>
  <button onclick="changeName()">닉네임 변경</button>
</div>

<div id="app"></div>

<script>
/* ================= FIREBASE ================= */
const firebaseConfig={
  apiKey:"AIzaSyAVBh5btDorOSdGOeV8h_eYYVjwokrdHOk",
  authDomain:"array-ff467.firebaseapp.com",
  databaseURL:"https://array-ff467-default-rtdb.firebaseio.com/",
  projectId:"array-ff467"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

/* ================= USER ================= */
let myName=localStorage.getItem("nickname")||prompt("닉네임")||"익명";
localStorage.setItem("nickname",myName);
document.getElementById("nick").innerText="👤 "+myName;

function changeName(){
  localStorage.removeItem("nickname");
  location.reload();
}

/* ================= DATA ================= */
const layout={
  "강남자리":["11시 방","11시 외각","1시 방","1시 외각"],
  "메인":["5시 방","6시 방","6시 외각"],
  "서브":["9시 방","9시 외각","3시 방","중앙법진"]
};

let state={};
let waitList=[];

/* ================= REALTIME ================= */
db.ref("tracker").on("value",snap=>{
  const v=snap.val()||{state:{},waitList:[]};
  state=v.state||{};
  waitList=v.waitList||[];
  render();
});

function save(){
  db.ref("tracker").set({state,waitList});
}

/* ================= AUTO ================= */
function updateWait(){
  const now=new Date();
  let changed=false;

  waitList.forEach(w=>{
    if(!w.time) return;

    const [h,m]=w.time.split(":").map(Number);
    const t=new Date();
    t.setHours(h,m,0,0);

    if(now>=t){
      if(w.status!=="ready"){
        w.status="ready";
        changed=true;
      }
    }
  });

  if(changed)save();
}
setInterval(updateWait,30000);

/* ================= HELPERS ================= */
function isExpired(t){
  if(!t) return false;
  const now=new Date();
  const [h,m]=t.split(":").map(Number);
  const d=new Date();
  d.setHours(h,m,0,0);
  return now>d;
}

function getClass(w){
  if(w.status==="ready")return"wait-urgent";
  if(w.status==="wait")return"wait-soon";
  return"wait-normal";
}

/* ================= TARGET LIST ================= */
function getAllTargets(){
  return Object.entries(layout).flatMap(([s,list])=>
    list.map(p=>`${s} - ${p}`)
  );
}

/* ================= RENDER ================= */
function render(){
  const app=document.getElementById("app");
  app.innerHTML="";

  /* ====== 자리 ====== */
  Object.entries(layout).forEach(([sec,list])=>{
    const box=document.createElement("div");
    box.className="section";

    const h=document.createElement("h3");
    h.innerText=sec;
    box.appendChild(h);

    list.forEach(pos=>{
      const row=document.createElement("div");
      row.className="item";

      const label=document.createElement("div");
      label.className="label";
      label.innerText=pos;

      const name=document.createElement("input");
      name.value=state[pos]?.name||"";

      const end=document.createElement("input");
      end.type="time";
      end.value=state[pos]?.endTime||"";

      const btn=document.createElement("button");
      btn.className="save";
      btn.innerText="저장";
      btn.onclick=()=>{
        state[pos]={name:name.value,endTime:end.value,user:myName};
        save();
      };

      const del=document.createElement("button");
      del.className="del";
      del.innerText="삭제";
      del.onclick=()=>{
        delete state[pos];
        save();
      };

      const info=document.createElement("div");
      info.className="time-label";
      info.innerText=state[pos]?.endTime?`⏰ ${state[pos].endTime}`:"⏰ 없음";

      if(state[pos]?.endTime&&isExpired(state[pos].endTime)){
        row.style.background="#fee2e2";
      }

      row.append(label,name,end,btn,del,info);
      box.appendChild(row);
    });

    app.appendChild(box);
  });

  /* ====== 대기 ====== */
  const waitBox=document.createElement("div");
  waitBox.className="section";

  const h=document.createElement("h3");
  h.innerText="대기";
  waitBox.appendChild(h);

  const targets=getAllTargets();

  waitList.forEach((w,i)=>{
    const row=document.createElement("div");
    row.className="item wait-row "+getClass(w);

    const name=document.createElement("input");
    name.value=w.name||"";

    const time=document.createElement("input");
    time.type="time";
    time.value=w.time||"";

    const select=document.createElement("select");
    targets.forEach(t=>{
      const o=document.createElement("option");
      o.value=t;
      o.innerText=t;
      if(w.target===t)o.selected=true;
      select.appendChild(o);
    });

    const status=document.createElement("div");
    status.className="time-label";
    status.innerText=w.status==="ready"
      ?"🟢 대기중"
      :`🟡 대기 (${w.target||"없음"})`;

    const save=document.createElement("button");
    save.className="save";
    save.innerText="저장";
    save.onclick=()=>{
      waitList[i]={name:name.value,time:time.value,target:select.value,status:w.status||"wait",user:myName};
      saveAll();
    };

    const fast=document.createElement("button");
    fast.className="save";
    fast.innerText="즉시 대기중";
    fast.onclick=()=>{
      waitList[i]={name:name.value,time:"",target:select.value,status:"ready",user:myName};
      saveAll();
    };

    const del=document.createElement("button");
    del.className="del";
    del.innerText="삭제";
    del.onclick=()=>{
      waitList.splice(i,1);
      saveAll();
    };

    row.append(name,time,select,save,fast,del,status);
    waitBox.appendChild(row);
  });

  const add=document.createElement("button");
  add.className="save";
  add.innerText="대기 추가";
  add.onclick=()=>{
    waitList.push({
      name:"새 인원",
      time:"",
      target:targets[0]||"",
      status:"ready",
      user:myName
    });
    saveAll();
  };

  waitBox.appendChild(add);
  app.appendChild(waitBox);
}

function saveAll(){
  db.ref("tracker").set({state,waitList});
}
</script>

</body>
</html>
